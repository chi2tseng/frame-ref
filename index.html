<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#ffffff">
<link rel="icon" href="data:,">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<title>FrameRef</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500&family=Inter:wght@400;500&family=Material+Symbols+Outlined&display=block">
<style>
/* ===== Cohere design tokens (white canvas + dark rounded media card, flat, no shadow) ===== */
:root{
  --canvas:#ffffff; --stone:#eeece7; --hair:#d9d9dd; --border-light:#e5e7eb;
  --ink:#212121; --muted:#93939f; --slate:#75758a;
  --primary:#17171c; --coral:#ff7759; --coral-soft:#ffad9b; --blue:#1863dc; --focus:#4c6ee6;
  --mono:ui-monospace,"SF Mono",Consolas,monospace;
  --sans:"Space Grotesk",Inter,-apple-system,"PingFang TC",sans-serif;
  --ease:cubic-bezier(.32,.72,0,1);          /* Apple 標準緩動 */
  --ease-spring:cubic-bezier(.34,1.3,.64,1); /* 回彈 */
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{
  background:var(--canvas);color:var(--ink);
  font-family:var(--sans);font-weight:400;
  overflow:hidden;overscroll-behavior:none;
  height:100vh;height:100dvh;
  -webkit-user-select:none;user-select:none;
}
.material-symbols-outlined{font-size:24px;line-height:1;user-select:none;}
.hidden{display:none!important;}
button{font-family:inherit;color:var(--ink);background:none;border:none;cursor:pointer;touch-action:manipulation;
  transition:transform .22s var(--ease-spring);}                 /* 放開回彈 */
button:active:not(:disabled){transform:scale(.96);transition-duration:.12s;}  /* 按下 */
:focus-visible{outline:2px solid var(--focus);outline-offset:2px;}

/* screens */
.screen{position:fixed;inset:0;}
.screen-in{animation:screenIn .22s var(--ease);}   /* 片庫↔播放器↔相機 進場 */
@keyframes screenIn{from{opacity:0;transform:scale(.985);}to{opacity:1;transform:scale(1);}}
#app{height:100vh;height:100dvh;}

/* ===== S1 library ===== */
.s1{display:flex;flex-direction:column;background:var(--canvas);}
/* empty state (no clips) — v1 two big buttons */
.lib-empty{flex:1 1 auto;display:flex;align-items:center;justify-content:center;
  padding:24px calc(24px + env(safe-area-inset-right)) calc(24px + env(safe-area-inset-bottom)) calc(24px + env(safe-area-inset-left));}
.s1-inner{display:flex;flex-direction:column;gap:14px;width:100%;max-width:320px;align-items:stretch;}
.big-btn{display:flex;align-items:center;justify-content:center;gap:10px;
  min-height:60px;border:1px solid var(--ink);border-radius:32px;background:transparent;color:var(--ink);
  font-size:16px;font-weight:500;}
.big-btn .material-symbols-outlined{font-size:24px;}
/* full library */
.lib-full{flex:1 1 auto;display:flex;flex-direction:column;min-height:0;
  padding-top:env(safe-area-inset-top);}
.lib-top{flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;
  padding:16px 16px 12px;border-bottom:1px solid var(--hair);}
.lib-title{font-size:22px;font-weight:500;letter-spacing:-.4px;}
.lib-actions{display:flex;gap:8px;}
.pill-btn{display:inline-flex;align-items:center;gap:6px;min-height:44px;padding:0 16px;
  border:1px solid var(--ink);border-radius:32px;background:transparent;color:var(--ink);
  font-size:14px;font-weight:500;}
.pill-btn .material-symbols-outlined{font-size:20px;}
.idb-warn{flex:0 0 auto;display:flex;align-items:center;gap:8px;margin:10px 16px 0;
  padding:10px 14px;border:1px solid var(--coral-soft);border-radius:16px;
  color:var(--ink);font-size:13px;background:transparent;}
.idb-warn .material-symbols-outlined{font-size:20px;color:var(--coral);}
.lib-grid{flex:1 1 auto;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;
  display:grid;grid-template-columns:1fr 1fr;gap:12px;
  align-content:start;                                           /* 卡片高度只跟內容,不被 grid 拉去填滿剩餘高 */
  padding:12px 16px calc(20px + env(safe-area-inset-bottom));}
.clip-card{display:flex;flex-direction:column;position:relative;
  border:1px solid var(--hair);border-radius:8px;background:var(--canvas);overflow:hidden;}
.clip-thumb{width:100%;aspect-ratio:3/4;background:var(--primary);display:block;overflow:hidden;}  /* 固定比例 cover 裁切,直式片不撐爆卡片 */
.clip-thumb img{width:100%;height:100%;object-fit:cover;display:block;}
.clip-name{padding:8px 10px 2px;font-size:14px;font-weight:500;line-height:1.3;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.clip-name-input{margin:6px 8px 2px;width:calc(100% - 16px);font-family:inherit;font-size:14px;
  border:1px solid var(--focus);border-radius:6px;padding:4px 6px;color:var(--ink);background:var(--canvas);}
.clip-meta{padding:0 10px 10px;font-family:var(--mono);font-size:11px;color:var(--muted);
  font-variant-numeric:tabular-nums;}
.clip-x{position:absolute;top:2px;right:2px;min-width:44px;height:44px;padding:0 8px;border-radius:22px;
  background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;}
.clip-x .material-symbols-outlined{font-size:18px;color:#fff;}
.clip-x.confirm{background:var(--coral);}
.del-confirm{color:#fff;font-size:12px;font-weight:500;padding:0 2px;}

/* ===== S2 camera (dark rounded card on white shell) ===== */
.s2{display:flex;flex-direction:column;background:var(--canvas);
  padding:env(safe-area-inset-top) 12px calc(12px + env(safe-area-inset-bottom));}
.cam-stage{flex:1 1 auto;position:relative;margin-top:12px;border-radius:22px;overflow:hidden;
  background:var(--primary);min-height:0;
  touch-action:none;}  /* iOS Safari 無視 user-scalable=no,捏合會變網頁縮放;這裡必須自己攔 */
.cam-video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;background:var(--primary);}
.cam-top{position:absolute;top:0;left:0;right:0;display:flex;align-items:center;justify-content:space-between;
  padding:12px 14px;z-index:2;}
.cam-bottom{position:absolute;bottom:0;left:0;right:0;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;
  padding:20px 28px 24px;z-index:2;}  /* v5: grid 1fr/auto/1fr → REC 永遠在水平中線 */
.cam-bottom>#btnFlip{justify-self:start;}
.cam-bottom>#btnCountdown{justify-self:end;}
.camicon{width:44px;height:44px;border-radius:50%;background:rgba(0,0,0,.4);color:#fff;
  display:flex;align-items:center;justify-content:center;}
.lens-row{position:absolute;bottom:114px;left:0;right:0;display:flex;justify-content:center;gap:14px;z-index:2;}
/* 鏡頭泡泡:仿 iPhone .5/1/2,34px 視覺 + 透明外擴到 44px 熱區 */
.lens-chip{position:relative;width:34px;height:34px;min-width:0;padding:0;border-radius:50%;
  border:1px solid rgba(255,255,255,.25);background:rgba(0,0,0,.35);color:#fff;
  font-family:var(--mono);font-size:12px;font-variant-numeric:tabular-nums;
  display:flex;align-items:center;justify-content:center;
  transition:transform .22s var(--ease-spring),background-color .22s var(--ease),color .22s var(--ease);}
.lens-chip::before{content:"";position:absolute;inset:-5px;}
.lens-chip.active{background:#fff;color:var(--ink);border-color:#fff;transform:scale(1.18);}
/* 相機 fps chip(右上,仿 iOS)*/
.cam-chip{padding:6px 12px;border-radius:20px;background:rgba(0,0,0,.4);color:#fff;
  font-family:var(--mono);font-size:13px;font-variant-numeric:tabular-nums;}
.cam-chip:disabled{opacity:.4;}
/* v5 無縫切換:acquire-then-swap 後套 120ms opacity 微 fade,蓋掉硬切感(Apple 式) */
.cam-video.swapfade{animation:camSwap .12s var(--ease);}
@keyframes camSwap{from{opacity:.6;}to{opacity:1;}}
/* v5 相機 pinch zoom 讀數(有 getCapabilities().zoom 且 ≠1 才顯示;泡泡列右側) */
.cam-zoom{position:absolute;right:16px;bottom:116px;z-index:2;padding:3px 8px;border-radius:14px;
  background:rgba(0,0,0,.4);color:#fff;font-family:var(--mono);font-size:12px;font-variant-numeric:tabular-nums;}
/* 底部漸淡黑 scrim(下 ~1/3,非整塊黑)*/
.cam-scrim{position:absolute;left:0;right:0;bottom:0;height:32%;z-index:1;pointer-events:none;
  background:linear-gradient(to top,rgba(0,0,0,.55),rgba(0,0,0,0));}
.camicon .material-symbols-outlined{color:#fff;}
.cd-label{font-size:15px;font-weight:500;color:#fff;}
#btnCountdown.active{background:var(--coral);}
.rec-time{position:absolute;left:50%;top:20px;transform:translateX(-50%);  /* v5: 絕對水平置中,不受 close/fps chip 寬度影響 */
  font-variant-numeric:tabular-nums;font-family:var(--mono);font-size:15px;color:#fff;
  background:rgba(0,0,0,.45);padding:5px 12px;border-radius:20px;display:flex;align-items:center;gap:6px;}
.rec-time::before{content:"";width:9px;height:9px;border-radius:50%;background:var(--coral);animation:blink 1s steps(1) infinite;}
@keyframes blink{50%{opacity:.15;}}
/* REC = coral solid circle; recording -> square + pulse */
.rec-btn{width:74px;height:74px;border-radius:50%;background:transparent;
  border:4px solid var(--coral);display:flex;align-items:center;justify-content:center;}
.rec-dot{width:56px;height:56px;border-radius:50%;background:var(--coral);transition:border-radius .15s,width .15s,height .15s;}
.rec-btn.recording{animation:pulse 1.2s ease-in-out infinite;}
.rec-btn.recording .rec-dot{width:30px;height:30px;border-radius:7px;}
@keyframes pulse{50%{border-color:var(--coral-soft);}}
.cam-err{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:calc(100% - 40px);max-width:320px;background:var(--canvas);border:1px solid var(--hair);
  border-radius:16px;padding:18px 20px;font-size:14px;line-height:1.6;color:var(--ink);z-index:3;text-align:center;}
.big-count{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-size:120px;font-weight:500;color:#fff;font-variant-numeric:tabular-nums;z-index:3;}

/* ===== S3 player shell ===== */
.s3{display:flex;flex-direction:column;height:100vh;height:100dvh;background:var(--canvas);
  padding-bottom:env(safe-area-inset-bottom);}
.topbar{display:flex;align-items:center;justify-content:space-between;
  padding:calc(10px + env(safe-area-inset-top)) 14px 10px;flex:0 0 auto;border-bottom:1px solid var(--hair);}
.brand{font-weight:500;font-size:17px;letter-spacing:-.2px;}
.top-actions{display:flex;align-items:center;gap:6px;}
/* chip = pill outline; active = coral fill + ink text */
.chip{min-height:44px;padding:0 14px;border:1px solid var(--ink);border-radius:32px;background:transparent;
  color:var(--ink);font-size:13px;font-weight:500;font-variant-numeric:tabular-nums;
  display:inline-flex;align-items:center;gap:3px;}
.chip.active{background:var(--coral);border-color:var(--coral);color:var(--ink);}
#btnFps.auto{background:var(--coral);border-color:var(--coral);color:var(--ink);}
.fps-unit{font-size:10px;color:var(--muted);}
#btnFps.active .fps-unit,#btnFps.auto .fps-unit{color:var(--ink);}
.sbtn{width:44px;height:44px;border-radius:22px;display:flex;align-items:center;justify-content:center;color:var(--ink);}
.sbtn.active{color:var(--coral);}
.warn-top{color:var(--coral);}
.fps-pop{position:absolute;top:calc(64px + env(safe-area-inset-top));right:14px;z-index:10;
  background:var(--canvas);border:1px solid var(--hair);border-radius:16px;padding:6px;
  display:flex;flex-direction:column;gap:2px;}
.fps-choice{min-height:44px;padding:0 22px;border-radius:22px;font-size:14px;color:var(--ink);
  font-variant-numeric:tabular-nums;text-align:center;}
.fps-choice.active{background:var(--coral);color:var(--ink);}

/* stage = near-black 22px rounded media card floating on white */
.stage{flex:1 1 auto;position:relative;background:var(--primary);overflow:hidden;
  margin:12px;border-radius:22px;touch-action:none;-webkit-touch-callout:none;min-height:0;}
.mirror-wrap,.zoom-wrap{position:absolute;inset:0;transform-origin:center center;}  /* v5: 移除 will-change(iOS 記憶體反噬);動畫只 transform/opacity */
#video{width:100%;height:100%;object-fit:contain;background:var(--primary);display:block;}
.hud{position:absolute;top:10px;left:10px;z-index:2;background:rgba(0,0,0,.42);
  border-radius:8px;padding:5px 8px;pointer-events:none;}
.frame-num{font-family:var(--mono);font-size:20px;font-weight:500;line-height:1.1;letter-spacing:.8px;color:#fff;}
.timecode{font-family:var(--mono);font-size:11px;color:rgba(255,255,255,.7);margin-top:2px;font-variant-numeric:tabular-nums;}
.stage-msg{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  background:var(--canvas);border:1px solid var(--hair);border-radius:16px;padding:14px 18px;font-size:14px;color:var(--ink);z-index:3;text-align:center;}

/* scrub — slider 與 filmstrip 同格,trim 時 max-height/opacity 交叉淡入(不 display:none 硬切) */
.scrub-wrap{flex:0 0 auto;padding:2px 0 2px;position:relative;}
.slider-layer{padding:2px 16px 0;max-height:56px;opacity:1;overflow:hidden;
  transition:max-height .26s var(--ease),opacity .2s var(--ease);}
.scrub-wrap.trimming .slider-layer{max-height:0;opacity:0;pointer-events:none;}
.slider{-webkit-appearance:none;appearance:none;width:100%;height:44px;background:transparent;touch-action:manipulation;}
.slider::-webkit-slider-runnable-track{height:4px;background:var(--hair);border-radius:2px;}
.slider::-moz-range-track{height:4px;background:var(--hair);border-radius:2px;}
.slider::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:20px;height:20px;border-radius:50%;
  background:var(--primary);margin-top:-8px;}
.slider::-moz-range-thumb{width:20px;height:20px;border:none;border-radius:50%;background:var(--primary);}
/* transport */
.transport{flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;gap:6px;padding:4px 16px;}
.tbtn{flex:1 1 0;min-width:0;height:48px;border-radius:32px;background:transparent;border:1px solid var(--ink);
  color:var(--ink);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:500;}
.transport>.t-gap{flex:.6 1 0;min-width:0;}   /* A/B 拔除後兩端留白,5 鈕置中 */
.tbtn.play{flex:1.4 1 0;background:var(--primary);border-color:var(--primary);}
.tbtn.play .material-symbols-outlined{font-size:30px;color:#fff;}

/* 模式列(deck):三層絕對疊放同格,切換時舊層 fade+下移出、新層 fade+上移進(240ms) */
.mode-deck{position:relative;flex:0 0 auto;height:52px;margin:4px 0 2px;}
.mode-layer{position:absolute;inset:0;display:flex;align-items:center;gap:8px;padding:0 20px;
  opacity:0;transform:translateY(8px);pointer-events:none;
  transition:opacity .24s var(--ease),transform .24s var(--ease);}
.mode-layer.active{opacity:1;transform:translateY(0);pointer-events:auto;}
#modeDefault{justify-content:space-evenly;}
#modeDraw{justify-content:space-evenly;}
#modeTrim{justify-content:space-between;padding:0 16px;}
#btnSpeed{min-width:44px;justify-content:center;}
#btnTrim.active{color:var(--coral);}

/* ===== FILMSTRIP (iPhone 式 trimmer;trim 模式取代 slider 那列) ===== */
.filmstrip{padding:0 16px;max-height:0;opacity:0;overflow:hidden;pointer-events:none;
  transition:max-height .26s var(--ease),opacity .22s var(--ease);}   /* 進出:高度 0→56 + opacity */
.scrub-wrap.trimming .filmstrip{max-height:80px;opacity:1;pointer-events:auto;}
.fs-track{position:relative;height:56px;margin:6px 0 4px;touch-action:none;-webkit-touch-callout:none;}
.fs-thumbs{position:absolute;inset:0;display:flex;border-radius:8px;overflow:hidden;background:var(--stone);}
.fs-thumb{flex:1 1 0;min-width:0;height:100%;object-fit:cover;background:var(--stone);}
.fs-mask{position:absolute;top:0;height:100%;background:rgba(255,255,255,.7);pointer-events:none;}  /* 白殼系統用亮遮罩 */
#fsMaskL{left:0;border-radius:8px 0 0 8px;}
#fsMaskR{right:0;border-radius:0 8px 8px 0;}
.fs-sel{position:absolute;top:0;height:100%;border:3px solid var(--coral);border-radius:8px;box-sizing:border-box;pointer-events:none;}
.fs-playhead{position:absolute;top:0;width:2px;height:100%;background:var(--ink);transform:translateX(-1px);pointer-events:none;}
.fs-handle{position:absolute;top:0;height:100%;width:20px;transform:translateX(-50%);background:var(--coral);
  border-radius:6px;display:flex;align-items:center;justify-content:center;
  pointer-events:auto;touch-action:none;}  /* 把手自己收事件:中心常落在 track 邊界外,靠 track 幾何 hit-test 會漏接 */
.fs-handle::before{content:"";position:absolute;inset:-8px -14px;}  /* 透明外擴熱區 48×72 ≥44px */
.fs-handle .material-symbols-outlined{font-size:18px;color:#fff;}
.trim-reset{min-height:44px;padding:0 10px;color:#616161;font-size:14px;font-weight:500;background:none;}
.trim-done{min-height:44px;padding:0 24px;border-radius:32px;background:var(--primary);color:#fff;font-size:14px;font-weight:500;}

/* ===== NOTES (逐幀畫筆標註) ===== */
.note-canvas{position:absolute;left:0;top:0;pointer-events:none;}  /* 尺寸由 JS 綁到整個舞台(zoomWrap);座標仍以影片內容框 normalize,故筆可畫進 letterbox */
.note-marks{position:relative;height:6px;margin:2px 10px 0;}
.note-mark{position:absolute;top:0;width:2px;height:6px;background:var(--coral);transform:translateX(-1px);}
#btnDraw.active{color:var(--coral);}
.note-color{width:44px;height:44px;flex-shrink:0;border-radius:50%;display:flex;align-items:center;justify-content:center;background:none;}  /* flex-shrink:0 防被壓到 <40 熱區 */
.note-color::after{content:"";width:22px;height:22px;border-radius:50%;background:var(--nc);}
.note-color.active::after{outline:2px solid var(--ink);outline-offset:3px;}   /* outline 非 box-shadow,守 Cohere 無陰影 */
#btnGhost.active{color:var(--coral);}
.sbtn:disabled{color:var(--hair);}
.sbtn.confirm{color:var(--coral);}

/* ===== v5 全機型適配(320px 起跳,直向為主、橫向可用;一律 CSS,無 JS 量測)===== */
/* 窄機 ≤359(iPhone SE/mini 320~359):控制列不換行不重疊、可見鈕 ≥40px */
@media (max-width:359px){
  .brand{font-size:14px;}                 /* 頂欄 brand 縮字讓出 icon 群空間 */
  .transport{padding:4px 8px;gap:4px;}    /* transport 收邊距 */
  .transport>.t-gap{flex-grow:0;}         /* 兩端留白歸零,5 鈕撐滿(320 → ~52px) */
  .sbtn{width:40px;height:40px;}          /* icon 鈕 40(達觸控下限) */
  .note-color{width:40px;height:40px;}    /* draw 層 note-color 縮 40 */
  .mode-layer{padding:0 4px;gap:3px;}     /* draw 層 7 項在 320 擠得下不溢出 */
  .trim-done{padding:0 10px;}
}
/* 橫向矮視窗:不做專屬版型,只壓縮高度求「可用不破」 */
@media (orientation:landscape) and (max-height:500px){
  .stage{margin:6px 12px;}
  .frame-num{font-size:15px;}
  .timecode{font-size:10px;}
  .scrub-wrap{padding:0;}
  .transport{padding:2px 16px;}
  .tbtn{height:44px;}
  .mode-deck{height:44px;}
}

/* 動效降級:尊重系統「減少動態效果」 */
@media (prefers-reduced-motion: reduce){
  *{transition-duration:.01ms!important;animation:none!important;}
}
</style>
</head>
<body>
<div id="app">

  <!-- S1 片庫 / 空狀態 -->
  <div id="screenS1" class="screen s1">
    <div id="libEmpty" class="lib-empty">
      <div class="s1-inner">
        <button id="btnRecEmpty" class="big-btn"><span class="material-symbols-outlined">videocam</span><span data-i18n="record">Record</span></button>
        <button id="btnLoadEmpty" class="big-btn"><span class="material-symbols-outlined">upload</span><span data-i18n="importVideo">Import Video</span></button>
      </div>
    </div>
    <div id="libFull" class="lib-full hidden">
      <div class="lib-top">
        <div class="lib-title">FrameRef</div>
        <div class="lib-actions">
          <button id="btnRecPill" class="pill-btn"><span class="material-symbols-outlined">videocam</span><span data-i18n="record">Record</span></button>
          <button id="btnLoadPill" class="pill-btn"><span class="material-symbols-outlined">upload</span><span data-i18n="import">Import</span></button>
          <button id="btnLang" class="trim-reset" data-i18n="langToggle">中</button>
        </div>
      </div>

let scr = "S1";

let mirror = false, playing = false;
let zoom = 1, panX = 0, panY = 0;
let hudOverride = null, scrubbing = false;

// 裁切:trimIn/trimOut 一律絕對幀(含末端);顯示層才換算相對幀。trimMode = filmstrip 裁切介面開關

// filmstrip 縮圖:per-clip 記憶體快取(不進 IDB,切 clip 作廢);fsDragType = 'L'|'R'|'body'
let fsThumbCache = null, fsBuildToken = 0, fsDragType = null;

// seek 合流:只記最新目標,seeked 回來後若又變了再 seek

// loop:開=在 [trimIn,trimOut] 整段循環;關=播到 trimOut 停(A-B 於 v3 整組移除)
let loopEnabled = false;

// 逐幀畫筆標註(SyncSketch 式):strokes 存 rec.notes["<絕對幀>"]=[{c,w,pts:[[x,y]...]}]
let annotMode = false, penColor = "#ff7759", penWidth = 4, ghostOn = false;  // 固定粗細 4(1080p 基準),壓感照舊
let noteCanvas = null, noteCtx = null, noteDpr = 1, lastNoteFrame = -1;
let lastRenderKey = null;                  // v5 renderNotes 髒檢查:frame:strokes數:ghost態;不變就 skip(繪製中/強制失效時為 null)
let drawing = false, curStroke = null, curPressures = null, noteDelTimer = null;
let priming = false, lastSliderWrite = 0;   // priming=開片靜音預熱解碼中(UI 凍結);lastSliderWrite=播放中 slider 低頻寫入

// speed
const SPEEDS = [1, 0.5, 0.25], SPEED_LABELS = ["1×", "½×", "¼×"];
let speedIdx = 0;

// 片庫(IDB 紀錄,newest-first;開啟時才給 .url)
let clips = [], curId = null;
let idbAvailable = true, containerFpsResolved = false;
let saveTimer = null, pendingSaveRec = null, thumbUrls = [], pendingDel = null;

// camera
let stream = null, recorder = null, chunks = [], facing = "environment", lensId = null;
let recTimerIv = null, recStart = 0, countdown3 = false, cdIv = null;
let camFps = 60;                          // 相機拍攝 fps 偏好(session 變數,重進相機沿用)
const CAM_FPS_CYCLE = [24, 30, 60];
let switching = false;                    // v5 無縫切換重入鎖(acquire-then-swap 進行中)
// v5 相機 pinch zoom(能力偵測:有 getCapabilities().zoom 才啟用;無能力全程不作用、不顯示)
let camZoomCap = null, camZoom = 1;
const camPointers = new Map();
let camPinchStartDist = 0, camPinchStartZoom = 1, camZoomRAF = null, camZoomPending = null;

// fps auto-detect(rVFC fallback 路徑)
let fpsSamples = [];
const FPS_TABLE = [24, 25, 30, 50, 60, 120, 240];
const FPS_CHOICES = [24, 25, 30, 50, 60, 120, 240];
const rvfcSupported = "requestVideoFrameCallback" in HTMLVideoElement.prototype;
let rvfcId = 0;

let wakeLock = null;

/* ======================= UTIL ======================= */
const clamp = (v, lo, hi) => v < lo ? lo : v > hi ? hi : v;
const dist = (a, b) => Math.hypot(a.x - b.x, a.y - b.y);
const mid = (a, b) => ({ x: (a.x + b.x) / 2, y: (a.y + b.y) / 2 });

// 顯示層相對幀換算(唯二兩個換算點,不撒進引擎)
const dispFrame = abs => clamp(abs, trimIn, trimOut) - trimIn;
const dispTotal = () => trimOut - trimIn + 1;

function fmtTC(frame){
  const s = frame / fps;
  const m = Math.floor(s / 60), sec = Math.floor(s % 60), cc = Math.floor((s % 1) * 100);
  return m + ":" + String(sec).padStart(2, "0") + "." + String(cc).padStart(2, "0");
}
function fmtDur(sec){
  if (!sec || !isFinite(sec)) return "0:00";
  const m = Math.floor(sec / 60), s = Math.floor(sec % 60);
  return m + ":" + String(s).padStart(2, "0");
}
function tsStamp(){
  const d = new Date(), p = n => String(n).padStart(2, "0");
  return "" + d.getFullYear() + p(d.getMonth()+1) + p(d.getDate()) + "_" +
         p(d.getHours()) + p(d.getMinutes()) + p(d.getSeconds());
}
const currentFrame = () => clamp(Math.floor(video.currentTime * fps), 0, Math.max(0, totalFrames - 1));
const curClip = () => clips.find(c => c.id === curId) || null;
// 目前顯示的「絕對幀」— notes key / filmstrip playhead / ghost 全用它;seek 中優先 hudOverride
const curAbs = () => clamp(hudOverride != null ? hudOverride : currentFrame(), trimIn, trimOut);

/* ======================= IDB (小 promise wrapper,不引庫) ======================= */
function idbOpen(){
  return new Promise((res, rej) => {
    let r;
    try{ r = indexedDB.open("frameref", 1); }catch(e){ return rej(e); }
    r.onupgradeneeded = () => { const db = r.result;
      if (!db.objectStoreNames.contains("clips")) db.createObjectStore("clips", { keyPath: "id", autoIncrement: true }); };
    r.onsuccess = () => res(r.result);
    r.onerror = () => rej(r.error);
  });
}
function idbReq(mode, fn){
  return idbOpen().then(db => new Promise((res, rej) => {
    const tx = db.transaction("clips", mode);
    const rq = fn(tx.objectStore("clips"));
    rq.onsuccess = () => res(rq.result);
    rq.onerror = () => rej(rq.error);
  }));
}
const idbGetAll = () => idbReq("readonly", st => st.getAll());
const idbPut = rec => idbReq("readwrite", st => st.put(rec));
const idbDelete = id => idbReq("readwrite", st => st.delete(id));

function persistClip(rec){
  if (!rec || !idbAvailable || rec.memoryOnly) return;
  const { url, ...data } = rec;               // 不存 objectURL
  idbPut(data).catch(err => { if (err && err.name === "QuotaExceededError") showQuotaWarn(); });
}
function persistSoon(rec){
  if (pendingSaveRec && pendingSaveRec !== rec) persistClip(pendingSaveRec);  // 換對象先沖掉前一筆,避免 debounce 吃寫入
  clearTimeout(saveTimer); pendingSaveRec = rec;
  saveTimer = setTimeout(() => { pendingSaveRec = null; persistClip(rec); }, 300);
}
function flushPendingSave(){ if (!pendingSaveRec) return; clearTimeout(saveTimer); const r = pendingSaveRec; pendingSaveRec = null; persistClip(r); }
function cancelPendingSave(rec){ if (pendingSaveRec === rec){ clearTimeout(saveTimer); pendingSaveRec = null; } }

/* ======================= MP4PARSE (容器級 fps;所有讀取用 slice,全 try/catch 回 null) ======================= */
function boxType(dv, o){
  return String.fromCharCode(dv.getUint8(o), dv.getUint8(o+1), dv.getUint8(o+2), dv.getUint8(o+3));
}
// 頂層走訪:每 box 讀 header(size+type),size===1 讀 largesize,size===0 到檔尾
async function readBoxAt(blob, off){
  const dv = new DataView(await blob.slice(off, off + 16).arrayBuffer());
  if (dv.byteLength < 8) return null;
  let size = dv.getUint32(0), hs = 8;
  const type = boxType(dv, 4);
  if (size === 1){
    if (dv.byteLength < 16) return null;
    size = dv.getUint32(8) * 4294967296 + dv.getUint32(12);   // largesize(64-bit)→Number
    hs = 16;
  } else if (size === 0){
    size = blob.size - off;                                    // 到檔尾
  }
  return { type, start: off, size, headerSize: hs, end: off + size };
}
async function findMoov(blob){
  let off = 0, guard = 0;
  while (off + 8 <= blob.size && guard++ < 128){              // cap:非 MP4(webm)不會被拆成大量 junk box 卡住
    const b = await readBoxAt(blob, off);
    if (!b || b.size < 8) return null;
    if (b.type === "moov") return b;                           // 檔頭/檔尾兩種佈局都走得到;mdat 直接跳過
    off = b.end;
  }
  return null;
}
// 在已讀入的 moov ArrayBuffer 內同步走 box
function* childBoxes(dv, start, end){
  let off = start;
  while (off + 8 <= end){
    let size = dv.getUint32(off), hs = 8;
    const type = boxType(dv, off + 4);
    if (size === 1){ size = dv.getUint32(off+8) * 4294967296 + dv.getUint32(off+12); hs = 16; }
    else if (size === 0){ size = end - off; }
    if (size < 8) return;
    yield { type, start: off, dataStart: off + hs, end: off + size };
    off += size;
  }
}
function firstChild(dv, box, type){
  for (const c of childBoxes(dv, box.dataStart, box.end)) if (c.type === type) return c;
  return null;
}
async function parseMp4Fps(blob){
  try{
    const moov = await findMoov(blob);
    if (!moov || moov.size > 8 * 1024 * 1024) return null;     // moov 過大放棄→fallback
    const dv = new DataView(await blob.slice(moov.start, moov.end).arrayBuffer());
    const moovBox = { dataStart: moov.headerSize, end: moov.size };   // buf 內相對座標
    for (const trak of [...childBoxes(dv, moovBox.dataStart, moovBox.end)].filter(b => b.type === "trak")){
      const mdia = firstChild(dv, trak, "mdia"); if (!mdia) continue;
      const hdlr = firstChild(dv, mdia, "hdlr"); if (!hdlr) continue;
      if (boxType(dv, hdlr.dataStart + 8) !== "vide") continue; // 只取視訊軌
      const mdhd = firstChild(dv, mdia, "mdhd"); if (!mdhd) continue;
      const ver = dv.getUint8(mdhd.dataStart);
      const timescale = ver === 1 ? dv.getUint32(mdhd.dataStart + 20) : dv.getUint32(mdhd.dataStart + 12);
      const minf = firstChild(dv, mdia, "minf"); if (!minf) continue;
      const stbl = firstChild(dv, minf, "stbl"); if (!stbl) continue;
      const stts = firstChild(dv, stbl, "stts"); if (!stts) continue;
      const entries = dv.getUint32(stts.dataStart + 4);
      let bestCount = -1, bestDelta = 0;                        // 加權眾數:取 sample count 最大的 entry
      for (let i = 0; i < entries; i++){
        const c = dv.getUint32(stts.dataStart + 8 + i * 8);
        const d = dv.getUint32(stts.dataStart + 12 + i * 8);
        if (c > bestCount){ bestCount = c; bestDelta = d; }
      }
      if (!bestDelta || !timescale) return null;
      const raw = timescale / bestDelta;
      for (const t of FPS_TABLE) if (Math.abs(raw - t) <= 0.5) return t;   // snap 常見值(±0.5 涵蓋 23.976/29.97/59.94)
      return Math.round(raw * 100) / 100;                       // 表外用實際值
    }
    return null;
  }catch(_){ return null; }                                     // 任何 throw 都不冒到 UI
}

/* ======================= SCREENS ======================= */
function showScreen(s){
  if (scr === "S2" && s !== "S2"){                              // v5 省電:離開相機確保停流 + 釋放預覽(srcObject=null)
    stopStream(); const cv = $("camVideo"); if (cv) cv.srcObject = null;
  }
  scr = s;
  const map = { S1: "screenS1", S2: "screenS2", S3: "screenS3" };
  for (const k in map){
    const el = $(map[k]), on = k === s;
    el.classList.toggle("hidden", !on);
    if (on){ el.classList.remove("screen-in"); void el.offsetWidth; el.classList.add("screen-in"); }  // reflow 重啟進場動畫
  }
}

/* ======================= LIBRARY (S1) ======================= */
function renderLibrary(){
  pendingDel = null;                                             // 重繪會重置 X 鈕視覺,狀態必須跟著歸零,否則單擊誤刪
  const staleThumbUrls = thumbUrls; thumbUrls = [];
  const grid = $("libGrid"); grid.innerHTML = "";
  staleThumbUrls.forEach(u => URL.revokeObjectURL(u));           // 舊 img 先離場(innerHTML 清空)才 revoke,否則對死 URL 噴 console error
  const has = clips.length > 0;
  $("libEmpty").classList.toggle("hidden", has);
  $("libFull").classList.toggle("hidden", !has);
  if (!has) return;
  clips.forEach(rec => {
    const card = document.createElement("div"); card.className = "clip-card";
    const th = document.createElement("div"); th.className = "clip-thumb";
    if (rec.thumb){ const u = URL.createObjectURL(rec.thumb); thumbUrls.push(u);
      const img = document.createElement("img"); img.src = u; img.alt = ""; th.appendChild(img); }
    const nm = document.createElement("div"); nm.className = "clip-name"; nm.textContent = rec.name;
    const meta = document.createElement("div"); meta.className = "clip-meta";
    meta.textContent = fmtDur(rec.dur) + " · " + rec.fps + " fps";
    const x = document.createElement("button"); x.className = "clip-x";
    x.innerHTML = '<span class="material-symbols-outlined">close</span>';
    th.addEventListener("click", () => openClip(rec.id));
    nm.addEventListener("click", e => { e.stopPropagation(); startRename(rec, nm); });
    x.addEventListener("click", e => { e.stopPropagation(); confirmDelete(rec, x); });
    card.appendChild(th); card.appendChild(nm); card.appendChild(meta); card.appendChild(x);
    grid.appendChild(card);
  });
}
function startRename(rec, nmEl){
  const inp = document.createElement("input"); inp.className = "clip-name-input"; inp.value = rec.name;
  nmEl.replaceWith(inp); inp.focus(); inp.select();
  const done = () => { rec.name = inp.value.trim() || rec.name; persistSoon(rec); renderLibrary(); };
  inp.addEventListener("keydown", e => { if (e.key === "Enter"){ e.preventDefault(); inp.blur(); } });
  inp.addEventListener("blur", done, { once: true });
}
function confirmDelete(rec, xEl){                                // 兩段式:第一下變「確認?」,再點才刪
  if (pendingDel && pendingDel.rec === rec){ clearPendingDel(); doDelete(rec); return; }
  clearPendingDel();
  xEl.classList.add("confirm"); xEl.innerHTML = '<span class="del-confirm">' + t("confirmDelete") + '</span>';
  pendingDel = { rec, xEl };
}
function clearPendingDel(){
  if (!pendingDel) return;

async function doDelete(rec){

/* ======================= CLIP open / add / thumb / save ======================= */
function closeClipUrl(){
  const c = clips.find(x => x.id === curId);
  if (c && c.url){
    if (video.src === c.url){ video.removeAttribute("src"); video.load(); }  // 先解除 video 引用再 revoke,免噴 ERR_FILE_NOT_FOUND
    URL.revokeObjectURL(c.url); c.url = null;
  }
}
function openClip(id){
  const rec = clips.find(c => c.id === id); if (!rec) return;
  flushPendingSave();                                           // 前一支的 pending 寫入先落地
  closeClipUrl();                                               // revoke 前一個
  curId = id;
  rec.url = URL.createObjectURL(rec.blob);
  resetZoom();
  fps = rec.fps || 30; fpsManual = !!rec.fpsManual;
  trimIn = rec.trimIn || 0; trimOut = rec.trimOut != null ? rec.trimOut : 0;
  containerFpsResolved = false;
  fpsSamples = [];
  fsThumbCache = null; fsBuildToken++; fsDragType = null;       // filmstrip 縮圖 per-clip 快取,切片作廢
  drawing = false; curStroke = null; lastNoteFrame = -1; lastRenderKey = null;  // 標註暫態歸零 + 換 clip 強制重繪(annotMode 開關本身沿用)
  clearTimeout(noteDelTimer); noteDelTimer = null; $("btnNoteClear").classList.remove("confirm");
  trimMode = false; syncTrimUI();                              // 回 slider,關 filmstrip
  if (!video.paused) video.pause();
  seeking = false; seekTarget = null; hudOverride = null;       // 不重置會讓逐格永久卡死
  hideStageMsg();
  if (noteCtx) noteCtx.clearRect(0, 0, noteCanvas.width, noteCanvas.height);
  video.src = rec.url; video.load();
  showScreen("S3");
  updateFpsChip();
  if (!fpsManual) tryContainerFps(rec);                         // 優先序:fpsManual > 容器 > rVFC
}
async function tryContainerFps(rec){
  const f = await parseMp4Fps(rec.blob);                        // 已內含 try/catch,回 null 不炸
  if (f && curId === rec.id && !fpsManual){
    containerFpsResolved = true;                                // 解析成功 → 停用該片 rVFC 自動套用
    if (f !== fps) { setFps(f); flashAutoChip(); }
    if (rec.fps !== f){ rec.fps = f; persistSoon(rec); }
  }
}
function makeThumb(blob){                                        // 載入 metadata 後 seek 中點抓 canvas(短邊 ≤240,jpeg .7)
  return new Promise(res => {
    const v = document.createElement("video");
    v.preload = "metadata"; v.muted = true; v.playsInline = true;
    const url = URL.createObjectURL(blob); let done = false;
    const finish = val => { if (done) return; done = true;
      try{ v.removeAttribute("src"); v.load(); }catch(_){}       // 先斷媒體管線再 revoke,否則殘留 range 請求噴 ERR_FILE_NOT_FOUND
      URL.revokeObjectURL(url); res(val); };
    setTimeout(() => finish({ thumb: null, dur: v.duration || 0 }), 3000);   // 畸形檔不觸發任何事件時的保險

    v.onloadedmetadata = () => { try{
        v.currentTime = clamp(v.duration / 2, 0, Math.max(0, (v.duration || 0) - 0.05));
      }catch(_){ finish({ thumb: null, dur: v.duration || 0 }); } };
    v.onseeked = () => { try{
        const w = v.videoWidth, h = v.videoHeight, scale = Math.min(1, 240 / Math.min(w, h));
        const cw = Math.max(1, Math.round(w * scale)), ch = Math.max(1, Math.round(h * scale));
        const c = document.createElement("canvas"); c.width = cw; c.height = ch;
        c.getContext("2d").drawImage(v, 0, 0, cw, ch);
        c.toBlob(b => finish({ thumb: b, dur: v.duration || 0, vw: w, vh: h }), "image/jpeg", 0.7);
      }catch(_){ finish({ thumb: null, dur: v.duration || 0 }); } };
    v.onerror = () => finish({ thumb: null, dur: 0 });
    v.src = url;
  });
}
async function addClip(blob, name){
  const [info, pf] = await Promise.all([makeThumb(blob), parseMp4Fps(blob).catch(() => null)]);
  const f = pf || 30, dur = info.dur || 0;
  const total = Math.max(1, Math.floor(dur * f));
  const rec = { name: name || (t("clipName") + " " + (clips.length + 1)), blob, thumb: info.thumb,
    fps: f, fpsManual: false, trimIn: 0, trimOut: total - 1, dur,
    vw: info.vw || 0, vh: info.vh || 0, created: Date.now() };
  if (idbAvailable){
    try{ rec.id = await idbPut(rec); }
    catch(err){ rec.memoryOnly = true; rec.id = "m" + Date.now();
      if (err && err.name === "QuotaExceededError") showQuotaWarn(); }
  } else { rec.memoryOnly = true; rec.id = "m" + Date.now(); }
  clips.unshift(rec);
  renderLibrary();
  openClip(rec.id);
}
function saveClip(){                                             // 下載原始 blob(裁切非破壞,存的是原檔)
  const rec = curClip(); if (!rec) return;
  const ext = rec.blob.type.includes("webm") ? "webm" : "mp4";
  const url = rec.url || URL.createObjectURL(rec.blob);
  const a = document.createElement("a");
  a.href = url; a.download = "frameref_" + tsStamp() + "." + ext;
  document.body.appendChild(a); a.click(); a.remove();
  if (!rec.url) URL.revokeObjectURL(url);
}

/* ======================= CAMERA (S2) ======================= */
async function enterCamera(){
  showScreen("S2"); hideCamErr();
  if (!window.isSecureContext){
    showCamErr(t("camErrHttps")); return;
  }
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
    showCamErr(t("camErrUnsupported")); return;
  }
  await startStream();
}
function buildVideoConstraints(){                               // 選了特定鏡頭(iPhone 0.5×/1×/長焦)用 deviceId,否則用 facingMode
  return lensId ? { deviceId: { exact: lensId }, width: { ideal: 1920 }, frameRate: { ideal: camFps } }
                : { facingMode: facing, width: { ideal: 1920 }, frameRate: { ideal: camFps } };
}
function applyCamPreview(){                                     // 新流上線後的預覽設定(srcObject 已賦值)
  const cam = $("camVideo");
  cam.play().catch(()=>{});
  cam.style.transform = facing === "user" ? "scaleX(-1)" : "none";  // 前鏡預覽鏡像,錄檔不鏡像
  hideCamErr(); updateLensRow(); updateCamFpsChip(); setupPinchZoom();
}
async function startStream(){                                  // 首次開啟(enterCamera):沒有舊流可保,直接取得
  stopStream();
  try{
    stream = await navigator.mediaDevices.getUserMedia({ video: buildVideoConstraints(), audio: true });
    $("camVideo").srcObject = stream;
    applyCamPreview();
  }catch(err){
    if (err.name === "OverconstrainedError" && lensId){ lensId = null; return startStream(); }  // 記住的鏡頭不存在了 → 退回 facingMode
    if (err.name === "NotAllowedError")
      showCamErr(t("camErrPermission"));
    else showCamErr(t("camErrGeneric") + err.name);
  }
}
async function switchStream(){                                 // v5 無縫切換鏡頭/前後:先拿新流(舊流繼續播),ready 才 swap + 停舊 track
  if (switching) return;                                       // 重入鎖(快連按不重複取得)
  switching = true;
  let next = null;
  try{
    next = await navigator.mediaDevices.getUserMedia({ video: buildVideoConstraints(), audio: true });
  }catch(err){
    switching = false;
    if (err.name === "OverconstrainedError" && lensId){ lensId = null; return switchStream(); }  // 記住的鏡頭沒了 → 退回 facingMode(舊流仍在)
    // 失敗:舊 stream 原封不動繼續用,inline 顯示錯誤一下(不打斷)
    showCamErr(err.name === "NotAllowedError"
      ? t("camErrPermission")
      : t("camErrSwitch") + err.name);
    setTimeout(hideCamErr, 1800);
    return;
  }
  const old = stream;                                          // 新流 ready 才動 srcObject / 停舊
  stream = next;
  const cam = $("camVideo");
  cam.srcObject = next;
  cam.classList.remove("swapfade"); void cam.offsetWidth; cam.classList.add("swapfade");  // 120ms opacity 0.6→1 微 fade
  applyCamPreview();
  if (old) old.getTracks().forEach(t => t.stop());            // 舊 track 停在新流上線之後(失敗路徑走不到這)
  switching = false;
}
function stopStream(){
  if (stream){ stream.getTracks().forEach(t => t.stop()); stream = null; }
  camZoomCap = null; camZoom = 1; camPointers.clear(); updateCamZoomLabel();   // v5 離開相機清 zoom 態
}
/* v5 相機 pinch zoom:能力偵測(getCapabilities().zoom),有才啟用;applyConstraints advanced zoom,rAF 節流,clamp min/max */
function setupPinchZoom(){
  const t = stream && stream.getVideoTracks()[0];
  const caps = t && t.getCapabilities ? t.getCapabilities() : null;
  if (caps && caps.zoom && typeof caps.zoom.max === "number" && caps.zoom.max > (caps.zoom.min || 1)){
    camZoomCap = { min: caps.zoom.min || 1, max: caps.zoom.max };
    const s = t.getSettings ? t.getSettings() : null;
    camZoom = (s && s.zoom) || camZoomCap.min || 1;
  } else { camZoomCap = null; camZoom = 1; }                   // 無 zoom 能力 → pinch 無作用、不顯示
  camPointers.clear();
  updateCamZoomLabel();
}
function updateCamZoomLabel(){
  const el = $("camZoomLabel"); if (!el) return;
  const show = !!camZoomCap && Math.abs(camZoom - 1) > 0.05;   // 有能力且 ≠1 才顯示
  el.classList.toggle("hidden", !show);
  if (show) el.textContent = camZoom.toFixed(1) + "×";
}
function camApplyZoom(z){
  if (!camZoomCap) return;
  camZoom = clamp(z, camZoomCap.min, camZoomCap.max);          // clamp 能力 min/max
  camZoomPending = camZoom;
  if (!camZoomRAF) camZoomRAF = requestAnimationFrame(() => {  // rAF 節流,避免每 move 打 applyConstraints
    camZoomRAF = null;
    const t = stream && stream.getVideoTracks()[0];
    if (t && camZoomPending != null) t.applyConstraints({ advanced: [{ zoom: camZoomPending }] }).catch(()=>{});
  });
  updateCamZoomLabel();
}
function camPinchDown(e){
  if (!camZoomCap) return;                                     // 無能力 = 完全不呼叫
  camPointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
  if (camPointers.size === 2){
    const p = [...camPointers.values()];
    camPinchStartDist = dist(p[0], p[1]) || 1;
    camPinchStartZoom = camZoom;
  }
}
function camPinchMove(e){
  if (!camZoomCap || !camPointers.has(e.pointerId)) return;
  camPointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
  if (camPointers.size >= 2){
    const p = [...camPointers.values()];
    camApplyZoom(camPinchStartZoom * ((dist(p[0], p[1]) || 1) / camPinchStartDist));
  }
}
function camPinchUp(e){ camPointers.delete(e.pointerId); }
async function updateLensRow(){
  const row = $("lensRow");
  try{
    if (facing === "user" || !navigator.mediaDevices.enumerateDevices){ row.classList.add("hidden"); return; }
    // 仿 iPhone:只列「實體」後鏡頭,每個焦段一顆(.5/1/2)。iPhone 另會回報 Dual/Triple/TrueDepth
    // 等虛擬合成裝置,全列出來泡泡會爆量 → 一律過濾。label 需權限後才有(startStream 之後呼叫)。
    const phys = (await navigator.mediaDevices.enumerateDevices())
      .filter(d => d.kind === "videoinput")
      .filter(d => !/front|user|facetime|truedepth|前置/i.test(d.label))
      .filter(d => !/dual|triple|雙鏡|三鏡/i.test(d.label));
    const rank = l => /ultra|超廣/i.test(l) ? 0 : /tele|望遠|長焦/i.test(l) ? 2 : 1;
    const seen = new Set();
    const lenses = phys.map(d => ({ d, r: rank(d.label) }))
      .sort((a, b) => a.r - b.r)
      .filter(x => !seen.has(x.r) && seen.add(x.r));               // 同焦段多裝置取第一
    if (lenses.length < 2){ row.classList.add("hidden"); return; }
    const curId = stream && stream.getVideoTracks()[0] && stream.getVideoTracks()[0].getSettings().deviceId;
    row.innerHTML = "";
    lenses.forEach(({ d, r }) => {
      const b = document.createElement("button");
      b.className = "lens-chip" + (d.deviceId === curId ? " active" : "");
      b.textContent = [".5", "1", "2"][r];
      b.addEventListener("click", () => switchLens(d.deviceId));
      row.appendChild(b);
    });
    row.classList.remove("hidden");
  }catch(_){ row.classList.add("hidden"); }
}
function switchLens(id){
  if (recorder && recorder.state === "recording") return;             // 換流會斷錄影,錄影中禁切
  if (cdIv) return;                                                   // 倒數中也不切
  lensId = id; switchStream();                                        // v5 無縫:acquire-then-swap
}
function updateCamFpsChip(){                                          // 顯示裝置回報的實際 fps(給不到就顯示偏好值,不騙人)
  const t = stream && stream.getVideoTracks()[0];
  let shown = camFps;
  if (t && t.getSettings){ const s = t.getSettings(); if (s && s.frameRate) shown = Math.round(s.frameRate); }
  const el = $("btnCamFps"); if (el) el.textContent = shown + " fps";
}
async function cycleCamFps(){                                         // tap 循環 24→30→60
  if (recorder && recorder.state === "recording") return;            // 錄影中禁改
  const i = CAM_FPS_CYCLE.indexOf(camFps);
  camFps = CAM_FPS_CYCLE[(i + 1) % CAM_FPS_CYCLE.length];
  const t = stream && stream.getVideoTracks()[0];
  if (t){
    try{ await t.applyConstraints({ frameRate: { ideal: camFps, max: camFps } }); }  // 先試不重啟串流
    catch(_){ await switchStream(); }                                                // reject → v5 無縫換流(帶新 frameRate)
  }
  updateCamFpsChip();
}
function showCamErr(msg){ const el = $("camErr"); el.textContent = msg; el.classList.remove("hidden"); }
function hideCamErr(){ $("camErr").classList.add("hidden"); }
function pickMime(){
  const cands = ["video/mp4;codecs=avc1", "video/mp4", "video/webm;codecs=vp9", "video/webm"];
  if (!window.MediaRecorder) return "";
  for (const c of cands) if (MediaRecorder.isTypeSupported(c)) return c;
  return "";
}
function onRecPress(){
  if (recorder && recorder.state === "recording"){ stopRec(); return; }
  if (cdIv){ clearInterval(cdIv); cdIv = null; hideBigCount(); return; }   // 倒數中按 REC = 取消倒數,防重入孤兒 recorder
  if (countdown3) runCountdown(startRec); else startRec();
}
function runCountdown(done){
  let n = 3; showBigCount(n);
  cdIv = setInterval(() => { n--;
    if (n <= 0){ clearInterval(cdIv); cdIv = null; hideBigCount(); done(); } else showBigCount(n); }, 1000);
}
function showBigCount(n){ const el = $("bigCount"); el.textContent = n; el.classList.remove("hidden"); }
function hideBigCount(){ $("bigCount").classList.add("hidden"); }
function startRec(){
  if (!stream) return;
  chunks = []; const mime = pickMime();
  try{ recorder = mime ? new MediaRecorder(stream, { mimeType: mime }) : new MediaRecorder(stream); }
  catch(e){ showCamErr(t("camErrRecordUnsupported") + e.name); return; }
  recorder.ondataavailable = e => { if (e.data && e.data.size) chunks.push(e.data); };
  recorder.onstop = () => { const type = recorder.mimeType || mime || "video/mp4";
    onNewRecording(new Blob(chunks, { type })); };
  recorder.start(); recStart = Date.now();
  recTimerIv = setInterval(updateRecTimer, 200); setRecUI(true);
}
function stopRec(){
  if (recorder && recorder.state !== "inactive") recorder.stop();
  clearInterval(recTimerIv); recTimerIv = null; setRecUI(false);
}
function updateRecTimer(){ $("recTime").textContent = fmtDur((Date.now() - recStart) / 1000); }
function setRecUI(on){

  $("recTime").classList.toggle("hidden", !on);
  $("btnCamFps").disabled = on;                 // 錄影中 fps chip 停用
  if (on) $("recTime").textContent = "0:00";
}
function onNewRecording(blob){ stopStream(); addClip(blob, null); }   // 錄完自動存片庫 + 直接開播放器

/* ======================= ENGINE (逐格 / seek;內部一律絕對幀) ======================= */
function seekToFrame(idx){
  if (!video.duration || !isFinite(video.duration)) return;
  idx = clamp(idx, trimIn, trimOut);                            // 裁切 clamp(隨時生效)
  frameTarget = idx;
  hudOverride = idx; updateHUD();
  let t = (idx + 0.5) / fps;                                    // 幀中點避免邊界抖動
  t = Math.min(t, video.duration - 0.001);
  seekTarget = t;
  if (!seeking){ seeking = true; doSeek(); }
}
function seekRaw(idx){                                          // filmstrip 專用:clamp 到全片(不套 trim 窗),可預覽被裁區
  if (!video.duration || !isFinite(video.duration)) return;
  idx = clamp(idx, 0, Math.max(0, totalFrames - 1));
  frameTarget = idx; hudOverride = idx; updateHUD();
  seekTarget = Math.min((idx + 0.5) / fps, video.duration - 0.001);
  if (!seeking){ seeking = true; doSeek(); }
}
function doSeek(){
  if (seekTarget == null){ seeking = false; return; }
  const t = seekTarget; seekTarget = null;
  video.currentTime = t;                                        // 不用 fastSeek(會 snap keyframe)
}
function step(n){
  if (!video.paused) video.pause();
  const base = seeking ? frameTarget : currentFrame();          // 連打(seek 中)用 frameTarget,否則用 live frame
  seekToFrame(base + n);
}
function setFps(f){
  const old = fps;
  const wasFull = (trimIn === 0 && trimOut === Math.max(0, totalFrames - 1));
  fps = f;
  if (video.duration && isFinite(video.duration)){
    totalFrames = Math.max(1, Math.floor(video.duration * fps));
    if (wasFull){ trimIn = 0; trimOut = totalFrames - 1; }      // 未裁切 → 換 fps 仍為整段
    else {                                                      // 已裁切 → 依時間點重算絕對幀,保住裁切窗
      trimIn = clamp(Math.round(trimIn / old * fps), 0, totalFrames - 1);
      trimOut = clamp(Math.round(trimOut / old * fps), 0, totalFrames - 1);
      if (trimOut <= trimIn) trimOut = totalFrames - 1;
    }
    slider.min = trimIn; slider.max = trimOut;
  }
  frameTarget = clamp(currentFrame(), trimIn, trimOut);
  const srec = curClip();
  if (old !== fps && srec) reprojectNotes(srec, old, fps);      // 筆跡 key 依秒數重投影(同 trim;防 rVFC 晚到型錯幀)
  // 重算後的 fps/trim/notes 必須寫回紀錄,否則 persist 到的是舊幀基準(rVFC 晚到型 bug:後半支片被舊基準吃掉)
  if (srec && (srec.fps !== fps || srec.trimIn !== trimIn || srec.trimOut !== trimOut || old !== fps)){
    srec.fps = fps; srec.trimIn = trimIn; srec.trimOut = trimOut; persistSoon(srec);
  }
  updateFpsChip(); syncTrimUI(); lastNoteFrame = -1; lastRenderKey = null; renderNotes(); updateNoteMarks(); updateHUD();  // reproject 後強制重繪
}

/* ======================= TRIM + FILMSTRIP (iPhone 式非破壞裁切) ======================= */
/* 內部狀態(trimIn/trimOut 絕對幀含末端、五路徑 clamp、相對幀顯示、IDB persist)沿用 v2,只換 UI 層:
   trim 模式用 filmstrip 映射整支片 0..total-1,拖把手改 in/out、拖條身 scrub;slider.min/max 仍綁 trim。 */
function toggleTrim(){ trimMode ? exitTrim() : enterTrim(); }
function enterTrim(){
  if (!curClip()) return;
  if (annotMode){                                              // 互斥:進裁切先退畫筆(單一模式列)
    annotMode = false; $("btnDraw").classList.remove("active");
    if (drawing){ drawing = false; curStroke = null; } renderNotes();
  }
  trimMode = true;
  if (!video.paused) video.pause();
  syncTrimUI();
  const count = filmstripCount();
  layoutFilmstripThumbs(count);
  updateFilmstrip();
  const rec = curClip();
  if (fsThumbCache && fsThumbCache.length === count) fsThumbCache.forEach((u, i) => fillFilmstripThumb(i, u));
  else if (rec) buildFilmstrip(rec, count);                     // 異步逐張填入(灰底佔位)
}
function exitTrim(){ trimMode = false; fsDragType = null; syncTrimUI(); }   // 離開:filmstrip 收起,縮圖快取留記憶體
function renderModeRow(){                                        // 模式列原地切換 default/draw/trim;toggle .active,靠 CSS transition 淡切(非 display:none)
  const mode = trimMode ? "trim" : (annotMode ? "draw" : "default");
  $("modeDefault").classList.toggle("active", mode === "default");
  $("modeDraw").classList.toggle("active", mode === "draw");
  $("modeTrim").classList.toggle("active", mode === "trim");
}
function syncTrimUI(){                                           // scrub 區(slider ⇄ filmstrip)交叉淡入 + 模式列同步
  $("btnTrim").classList.toggle("active", trimMode);
  $("scrubWrap").classList.toggle("trimming", trimMode);
  renderModeRow();
  if (trimMode) updateFilmstrip();
}
function filmstripCount(){
  const rec = curClip();
  const aspect = (rec && rec.vw && rec.vh) ? rec.vw / rec.vh : 9 / 16;
  const trackW = $("fsTrack").clientWidth || 343;

}

}
function fillFilmstripThumb(i, dataURL){
  const im = $("fsThumbs").children[i];

}
function seekVideoTo(v, t, ms){                                  // 縮圖用獨立 video 的 seek promise(逾時保險)

function updateFilmstrip(){                                     // 依 trimIn/trimOut/目前幀 定位遮罩/選取框/把手/播放頭
  if (!trimMode) return;
  const last = Math.max(1, totalFrames - 1);
  const inPct = trimIn / last * 100, outPct = trimOut / last * 100;
  $("fsMaskL").style.width = inPct + "%";
  $("fsMaskR").style.width = (100 - outPct) + "%";
  const sel = $("fsSel"); sel.style.left = inPct + "%"; sel.style.width = (outPct - inPct) + "%";
  $("fsHandleL").style.left = inPct + "%";
  $("fsHandleR").style.left = outPct + "%";
  const cf = clamp(seeking ? frameTarget : currentFrame(), 0, last);

function resetTrim(){ trimIn = 0; trimOut = Math.max(0, totalFrames - 1); applyTrim(); }
function applyTrim(){                                            // 生效 + persist(非破壞,原檔不動);seek clamp 回窗內

/* filmstrip 指標:把手 pointer-events:none,靠 fsTrack 上 ±22px hit-test 分辨 L/R/body(熱區 ≥44px) */
const frameFromX = (clientX, rect) => clamp(Math.round((clientX - rect.left) / rect.width * (totalFrames - 1)), 0, totalFrames - 1);
function fsDown(e){
  if (!video.paused) video.pause();                             // 拖把手期間停用播放/jog
  const rect = $("fsTrack").getBoundingClientRect();
  const last = Math.max(1, totalFrames - 1), x = e.clientX - rect.left;
  const dl = Math.abs(x - trimIn / last * rect.width), dr = Math.abs(x - trimOut / last * rect.width);

  else if (dr <= 22) fsDragType = "R";
  else fsDragType = "body";                                     // 拖條身 = scrub 整支片(可看被裁區)
  try{ $("fsTrack").setPointerCapture(e.pointerId); }catch(_){}
  fsMove(e);
}
function fsMove(e){
  if (!fsDragType) return;
  const f = frameFromX(e.clientX, $("fsTrack").getBoundingClientRect());
  if (fsDragType === "L"){ trimIn = Math.min(f, trimOut); seekRaw(trimIn); }        // 最小區間 1 幀(trimIn ≤ trimOut)
  else if (fsDragType === "R"){ trimOut = Math.max(f, trimIn); seekRaw(trimOut); }

function fsHandleDown(type){                                     // 把手直收:中心可在 track 邊界外,不能靠 fsTrack 幾何

    try{ e.currentTarget.setPointerCapture(e.pointerId); }catch(_){}
    fsMove(e);
  };
}
function fsUp(e){

  try{ e.currentTarget.releasePointerCapture(e.pointerId); }catch(_){}
  if (wasHandle) applyTrim();                                   // 放開把手才 persist
  else updateFilmstrip();                                       // body scrub 停在該處不 persist;下次 step/播放 clamp 回窗

/* ======================= FPS auto (rVFC fallback;僅容器解析失敗時作用) ======================= */
function collectFpsSample(md){
  if (video.paused || containerFpsResolved || fpsManual) return;
  if (md == null || md.mediaTime == null || md.presentedFrames == null) return;
  fpsSamples.push({ t: md.mediaTime, p: md.presentedFrames });
  if (fpsSamples.length >= 20){
    const a = fpsSamples[0], b = fpsSamples[fpsSamples.length - 1];
    const dp = b.p - a.p, dt = b.t - a.t;                       // presentedFrames 可能不連續,只算比率
    if (dt > 0 && dp > 0){ const guess = nearestFps(dp / dt); if (guess) applyAutoFps(guess); }
    fpsSamples = [];
  }
}
function nearestFps(rate){
  let best = null, bd = Infinity;
  for (const f of FPS_TABLE){ const d = Math.abs(f - rate); if (d < bd){ bd = d; best = f; } }
  return bd <= 2 ? best : null;
}
function applyAutoFps(f){
  if (fpsManual || containerFpsResolved || f === fps) return;
  setFps(f); flashAutoChip();
  const rec = curClip(); if (rec){ rec.fps = f; persistSoon(rec); }
}

/* ======================= HUD (顯示層相對幀) ======================= */
function updateHUD(){
  if (priming) return;                                           // 預熱中 UI 凍結

  const fn = "#" + String(dispFrame(absF)).padStart(4, "0");                        // v5 寫入去重:值變才寫(顯示結果不變,只省每幀 DOM 寫入/layout)
  const fnEl = $("frameNum"); if (fnEl.textContent !== fn) fnEl.textContent = fn;
  const tc = fmtTC(dispFrame(absF)) + " / " + fmtTC(dispTotal() - 1);
  const tcEl = $("timecode"); if (tcEl.textContent !== tc) tcEl.textContent = tc;
  if (!scrubbing){                                               // 播放中 slider 低頻寫(~7Hz):range input 每幀寫值會逼 layout,iOS 起播最有感
    const sv = String(absF);

      slider.value = sv; lastSliderWrite = performance.now();
    }
  }

}
function updateFpsChip(){ $("btnFps").innerHTML = fps + '<span class="fps-unit">fps</span>'; }
function flashAutoChip(){
  const b = $("btnFps"); b.classList.add("auto");

}
function showStageMsg(m){ const el = $("stageMsg"); el.textContent = m; el.classList.remove("hidden"); }
function hideStageMsg(){ $("stageMsg").classList.add("hidden"); }

/* ======================= PLAYBACK / LOOP / SPEED / MIRROR ======================= */
function togglePlay(){
  if (priming){                                                  // 預熱中按播放=直接轉正:取消凍結、開聲繼續播
    priming = false; video.muted = false; playing = true; setPlayUI(true); hudOverride = null;
    return;
  }

}
function setPlayUI(on){ $("btnPlay").querySelector(".material-symbols-outlined").textContent = on ? "pause" : "play_arrow"; }
function loopCheck(){                                            // 裁切邊界(播放中每幀 rVFC / 或 timeupdate 檢查)

  if (video.currentTime >= (trimOut + 1) / fps - 1e-4){         // 播放到 trimOut 末端
    if (loopEnabled) video.currentTime = (trimIn + 0.5) / fps;  // loop on → 回 trimIn(整段循環)

function toggleLoop(){ loopEnabled = !loopEnabled; $("btnLoop").classList.toggle("active", loopEnabled); }
function cycleSpeed(){

  $("btnSpeed").textContent = SPEED_LABELS[speedIdx];
}
function toggleMirror(){ mirror = !mirror; applyTransform(); $("btnMirror").classList.toggle("active", mirror); }

/* ======================= TRANSFORM (zoom/pan/mirror) ======================= */
function applyTransform(){
  mirrorWrap.style.transform = mirror ? "scaleX(-1)" : "none";  // mirror 最外層,pan 座標數學不用改
  zoomWrap.style.transform = "translate(" + panX + "px," + panY + "px) scale(" + zoom + ")";
}
function clampPanX(x){ const m = (zoom - 1) * stage.clientWidth / 2; return clamp(x, -m, m); }
function clampPanY(y){ const m = (zoom - 1) * stage.clientHeight / 2; return clamp(y, -m, m); }
function resetZoom(){ zoom = 1; panX = 0; panY = 0; applyTransform(); }
function applyZoomAt(z, anchor, startZoom, startPan){           // 以 anchor 為錨:t' = r*t0 + d*(1-r)

  let dx = anchor.x - Ox; if (mirror) dx = -dx;                 // 外層鏡像 → 內層 x 相反
  const dy = anchor.y - Oy, r = z / startZoom;

  if (zoom <= 1.0001){ zoom = 1; panX = 0; panY = 0; }
  else { panX = clampPanX(r * startPan.x + dx * (1 - r)); panY = clampPanY(r * startPan.y + dy * (1 - r)); }
  applyTransform();
}

/* ======================= GESTURES (Pointer Events) ======================= */
/* 手勢仲裁:單指=jog(常態)/畫筆(標註模式);雙指=pinch+pan 合一(兩模式皆同);double-tap=zoom(兩模式皆同) */

/* ======================= NOTES (逐幀畫筆標註;canvas 綁影片內容框,在 zoomWrap 內隨 zoom/pan/mirror) ======================= */
function initNoteCanvas(){ noteCanvas = $("noteCanvas"); noteCtx = noteCanvas.getContext("2d"); }
function noteContentBox(ew, eh){                                // 影片內容框(contain)在舞台內的置中矩形 → {ox,oy,cw,ch}

  const s = Math.min(ew / vw, eh / vh);
  const cw = Math.max(1, vw * s), ch = Math.max(1, vh * s);

function layoutNoteCanvas(){                                    // v4:canvas = 整個舞台(zoomWrap);內容框只在座標/繪製時換算,故筆可畫進 letterbox
  if (!noteCanvas) return;
  const ew = zoomWrap.clientWidth, eh = zoomWrap.clientHeight;
  noteCanvas.style.left = "0px"; noteCanvas.style.top = "0px";
  noteCanvas.style.width = ew + "px"; noteCanvas.style.height = eh + "px";
  noteDpr = Math.min(window.devicePixelRatio || 1, 2);         // v5: backing store dpr 上限 2(iPhone dpr=3 → 填充成本 −55%)
  noteCanvas.width = Math.max(1, Math.round(ew * noteDpr)); noteCanvas.height = Math.max(1, Math.round(eh * noteDpr));

function noteXY(e){                                             // pointer → 內容框 normalized(可 <0/>1,直接存);鏡像存未鏡像基準(x=1-x)

  let fx = (e.clientX - r.left) / r.width;
  const fy = (e.clientY - r.top) / r.height;
  if (mirror) fx = 1 - fx;                                     // 外層 scaleX(-1):螢幕比例 → 內容比例翻轉
  const ew = noteCanvas.width / noteDpr, eh = noteCanvas.height / noteDpr;
  const b = noteContentBox(ew, eh);
  return [(fx - b.ox / ew) / (b.cw / ew), (fy - b.oy / eh) / (b.ch / eh)];   // 內容框內為 0..1,letterbox 為 <0/>1
}
function noteDown(e){

}
function noteMove(e){

  let [x, y] = noteXY(e);
  if (e.shiftKey){                                             // Shift 拘束:以起點主軸鎖水平/垂直(桌面)
    const [x0, y0] = curStroke.pts[0];
    if (Math.abs(x - x0) >= Math.abs(y - y0)) y = y0; else x = x0;
  }

    const avg = curPressures.reduce((a, b) => a + b, 0) / curPressures.length;
    if (avg > 0) s.w = penWidth * (0.6 + 0.8 * avg);           // 壓感:每筆一個寬(整筆平均壓力)
    const rec = curClip();

      if (!rec.notes) rec.notes = {};

      persistSoon(rec); updateNoteMarks();
    }

function drawStrokes(arr, ox, oy, cw, ch, scale, override, alpha){   // 座標 = 內容框左上(ox,oy)+ normalized × 內容框尺寸;normalized 可 <0/>1(畫進 letterbox)

  if (ghostOn && rec.notes){                                   // 洋蔥皮:前一標註幀藍調 / 後一 coral 調,各 25%,只各取一幀
    const pv = nearestNoteFrame(f, -1), nx = nearestNoteFrame(f, 1);
    if (pv != null) drawStrokes(rec.notes[pv], b.ox, b.oy, b.cw, b.ch, scale, "#1863dc", 0.25);
    if (nx != null) drawStrokes(rec.notes[nx], b.ox, b.oy, b.cw, b.ch, scale, "#ff7759", 0.25);
  }
  if (rec.notes && rec.notes[f]) drawStrokes(rec.notes[f], b.ox, b.oy, b.cw, b.ch, scale, null, 1);
  if (curStroke) drawStrokes([curStroke], b.ox, b.oy, b.cw, b.ch, scale, null, 1);
}
function nearestNoteFrame(f, dir){                              // 最近的「有筆跡幀」(dir<0 往前 / dir>0 往後)
  const rec = curClip(); if (!rec || !rec.notes) return null;
  let best = null;
  for (const k in rec.notes){
    const key = +k; if (!rec.notes[k].length) continue;
    if (dir < 0 && key < f && (best == null || key > best)) best = key;
    if (dir > 0 && key > f && (best == null || key < best)) best = key;
  }
  return best;
}
function gotoNoteFrame(dir){ const k = nearestNoteFrame(curAbs(), dir); if (k != null) seekToFrame(k); }
function undoNote(){                                            // 只 pop 目前幀最後一筆,可連按;換幀即失去 undo 能力
  const rec = curClip(); if (!rec || !rec.notes) return;
  const f = curAbs(), arr = rec.notes[f];
  if (arr && arr.length){ arr.pop(); if (!arr.length) delete rec.notes[f];
    persistSoon(rec); lastNoteFrame = -1; renderNotes(); updateNoteMarks(); }
}
function clearNoteFrame(){                                      // 清本幀(兩段式確認,同刪 clip)
  const rec = curClip(); if (!rec || !rec.notes) return;
  const f = curAbs(); if (!rec.notes[f] || !rec.notes[f].length) return;
  if (!noteDelTimer){
    $("btnNoteClear").classList.add("confirm");
    noteDelTimer = setTimeout(() => { noteDelTimer = null; $("btnNoteClear").classList.remove("confirm"); }, 2500);
    return;
  }
  clearTimeout(noteDelTimer); noteDelTimer = null; $("btnNoteClear").classList.remove("confirm");
  delete rec.notes[f]; persistSoon(rec); lastNoteFrame = -1; renderNotes(); updateNoteMarks();
}
function reprojectNotes(rec, oldFps, newFps){                  // fps 改 → key 依秒數重投影(衝突合併陣列);防 rVFC 晚到錯幀
  if (!rec || !rec.notes) return;
  const out = {};
  for (const k in rec.notes){
    const nk = Math.max(0, Math.round((+k + 0.5) / oldFps * newFps - 0.5));
    (out[nk] || (out[nk] = [])).push(...rec.notes[k]);
  }
  rec.notes = out;
}
function updateNoteMarks(){                                     // slider 下方 2px coral 細直線標有筆跡幀(≤200,超過抽稀)
  const el = $("noteMarks"); if (!el) return;
  el.innerHTML = "";
  const rec = curClip(); if (!rec || !rec.notes) return;
  let keys = Object.keys(rec.notes).map(Number)
    .filter(k => rec.notes[k] && rec.notes[k].length && k >= trimIn && k <= trimOut).sort((a, b) => a - b);
  if (keys.length > 200){ const stride = Math.ceil(keys.length / 200); keys = keys.filter((_, i) => i % stride === 0); }
  const span = Math.max(1, trimOut - trimIn);
  keys.forEach(k => { const d = document.createElement("div"); d.className = "note-mark";
    d.style.left = ((k - trimIn) / span * 100) + "%"; el.appendChild(d); });
}
function toggleDraw(){                                          // 標註模式開關(單指 jog ↔ 畫筆)
  annotMode = !annotMode;
  if (annotMode && trimMode) exitTrim();                       // 互斥:進畫筆先退裁切(單一模式列)
  $("btnDraw").classList.toggle("active", annotMode);
  renderModeRow();                                             // 模式列切到 draw / 回 default
  if (!annotMode && drawing){ drawing = false; curStroke = null; renderNotes(); }
  gMode = "none";
}
function toggleGhost(){ ghostOn = !ghostOn; $("btnGhost").classList.toggle("active", ghostOn); lastNoteFrame = -1; renderNotes(); }
function setPenColor(c, btn){
  penColor = c;
  document.querySelectorAll(".note-color").forEach(b => b.classList.toggle("active", b === btn));
}

/* ======================= WAKE LOCK ======================= */
async function requestWakeLock(){
  try{ if (navigator.wakeLock) wakeLock = await navigator.wakeLock.request("screen"); }catch(_){}
}
document.addEventListener("visibilitychange", () => {
  if (document.visibilityState === "visible" && curId != null) requestWakeLock();
});

/* ======================= VIDEO EVENTS ======================= */
video.addEventListener("loadedmetadata", () => {
  const rec = curClip();
  totalFrames = Math.max(1, Math.floor(video.duration * fps));
  if (rec){
    if (rec.dur !== video.duration && isFinite(video.duration)) rec.dur = video.duration;
    if (rec.trimOut == null || rec.trimOut > totalFrames - 1) rec.trimOut = totalFrames - 1;
    trimIn = clamp(rec.trimIn || 0, 0, totalFrames - 1);
    trimOut = clamp(rec.trimOut, 0, totalFrames - 1);
    if (trimOut <= trimIn) trimOut = totalFrames - 1;
  } else { trimIn = 0; trimOut = totalFrames - 1; }
  slider.min = trimIn; slider.max = trimOut;
  video.playbackRate = SPEEDS[speedIdx];
  frameTarget = trimIn; seekToFrame(trimIn);                    // 停在裁切後第 0 幀
  primeDecoder();                                               // iOS 首播掉幀:開片先靜音短播預熱解碼管線
  layoutNoteCanvas(); syncTrimUI(); updateNoteMarks(); updateHUD();
  requestWakeLock(); startRvfc();
});
video.addEventListener("seeked", () => {
  if (seekTarget != null) doSeek();
  else { seeking = false; hudOverride = null; updateHUD(); }
});
video.addEventListener("timeupdate", () => { if (priming) return; if (!video.paused){ loopCheck(); updateHUD(); } });
video.addEventListener("play", () => { if (priming) return; playing = true; setPlayUI(true); hudOverride = null; });
video.addEventListener("pause", () => { if (priming) return; playing = false; setPlayUI(false); frameTarget = currentFrame(); updateHUD(); });
video.addEventListener("ended", () => {                          // 自然結尾(loopCheck 沒攔到時的後備)
  if (loopEnabled){ video.currentTime = (trimIn + 0.5) / fps; video.play().catch(()=>{}); }
  else { setPlayUI(false); seekToFrame(trimOut); }
});
video.addEventListener("error", () => { if (video.currentSrc) showStageMsg(t("playerErrFormat")); });

function primeDecoder(){                                         // 靜音短播即停:讓 iOS 把解碼管線熱起來,首次真播不掉幀
  if (priming) return;
  priming = true; hudOverride = trimIn;                          // HUD 凍在起點,預熱過程不可見
  const wasMuted = video.muted; video.muted = true;
  const endPrime = () => {
    if (!priming) return;                                        // togglePlay 已接手(使用者在預熱中按了播放)
    priming = false; video.pause(); video.muted = wasMuted;
    seekToFrame(trimIn);
  };
  video.play().then(() => setTimeout(endPrime, 140)).catch(() => { priming = false; video.muted = wasMuted; });
}

function startRvfc(){
  if (!rvfcSupported) return;
  const my = ++rvfcId;                                          // 換 clip 時作廢舊迴圈
  const loop = (now, md) => {
    if (my !== rvfcId) return;
    collectFpsSample(md); loopCheck(); updateHUD();
    video.requestVideoFrameCallback(loop);                      // rVFC 需自我重排
  };
  video.requestVideoFrameCallback(loop);
}

/* ======================= KEYBOARD (桌面) ======================= */
document.addEventListener("keydown", e => {
  if (scr !== "S3") return;
  const tag = (e.target.tagName || "").toLowerCase();
  if (tag === "input" || tag === "textarea") return;
  if ((e.ctrlKey || e.metaKey) && (e.key === "z" || e.key === "Z")){   // Ctrl/Cmd-Z:標註模式 undo 本幀最後一筆
    if (annotMode){ e.preventDefault(); undoNote(); } return;
  }
  switch (e.key){
    case " ": e.preventDefault(); togglePlay(); break;
    case "ArrowLeft": e.preventDefault(); step(e.shiftKey ? -5 : -1); break;
    case "ArrowRight": e.preventDefault(); step(e.shiftKey ? 5 : 1); break;
    case "ArrowUp": e.preventDefault(); gotoNoteFrame(-1); break;      // 上一標註幀
    case "ArrowDown": e.preventDefault(); gotoNoteFrame(1); break;     // 下一標註幀
    case ",": step(-1); break;
    case ".": step(1); break;
    case "d": case "D": toggleDraw(); break;                           // 畫筆 toggle
    case "g": case "G": toggleGhost(); break;                          // ghost toggle
    case "l": case "L": toggleLoop(); break;
    case "m": case "M": toggleMirror(); break;
  }
});

/* ======================= FPS POPUP ======================= */
function toggleFpsPop(){
  const pop = $("fpsPop"); pop.classList.toggle("hidden");
  if (!pop.classList.contains("hidden")) renderFpsPop();
}
function renderFpsPop(){
  const pop = $("fpsPop"); pop.innerHTML = "";
  FPS_CHOICES.forEach(f => {
    const b = document.createElement("button");
    b.className = "fps-choice" + (f === fps ? " active" : "");
    b.textContent = f;
    b.addEventListener("click", () => {                         // 手動選 fps:最高優先,持久化
      fpsManual = true; containerFpsResolved = true; setFps(f);
      const rec = curClip(); if (rec){ rec.fps = f; rec.fpsManual = true; persistSoon(rec); }
      pop.classList.add("hidden");
    });
    pop.appendChild(b);
  });
}

/* ======================= WIRING ======================= */
$("btnRecEmpty").addEventListener("click", enterCamera);
$("btnLoadEmpty").addEventListener("click", () => $("fileInput").click());
$("btnRecPill").addEventListener("click", enterCamera);
$("btnLoadPill").addEventListener("click", () => $("fileInput").click());
$("btnLang").addEventListener("click", toggleLang);
$("fileInput").addEventListener("change", e => {                // 不加 capture、不檢查副檔名(.mov 直接餵)
  const f = e.target.files[0]; if (!f) return;
  addClip(f, f.name.slice(0, 12));
  e.target.value = "";
});
// S2
$("btnCamClose").addEventListener("click", () => {
  if (cdIv){ clearInterval(cdIv); cdIv = null; hideBigCount(); }
  stopRec(); stopStream();
  if (curId != null) showScreen("S3"); else { showScreen("S1"); renderLibrary(); }
});
$("btnRec").addEventListener("click", onRecPress);
$("btnCamFps").addEventListener("click", cycleCamFps);
$("btnFlip").addEventListener("click", () => {
  if (recorder && recorder.state === "recording") return;      // 錄影中禁切鏡頭(換流會中斷錄影)
  facing = facing === "user" ? "environment" : "user";
  lensId = null;                                               // 換面即放棄特定鏡頭選擇,回 facingMode
  switchStream();                                              // v5 無縫:舊流續播到新流 ready
});
$("btnCountdown").addEventListener("click", () => { countdown3 = !countdown3; $("btnCountdown").classList.toggle("active", countdown3); });
// v5 相機 pinch zoom:pointer 掛整個 cam-stage;camPinch* 內部無能力即 return,不吃單指按鈕點擊(不 capture、不 preventDefault)
(() => { const cs = document.querySelector(".cam-stage"); if (!cs) return;
  // iOS Safari 的捏合走專有 gesture 事件、且無視 user-scalable=no → 不擋就變「放大網頁」
  ["gesturestart", "gesturechange", "gestureend"].forEach(t => cs.addEventListener(t, e => e.preventDefault()));
  cs.addEventListener("pointerdown", camPinchDown);
  cs.addEventListener("pointermove", camPinchMove);
  cs.addEventListener("pointerup", camPinchUp);
  cs.addEventListener("pointercancel", camPinchUp);
})();
// S3 top
$("btnFps").addEventListener("click", toggleFpsPop);
$("btnMirror").addEventListener("click", toggleMirror);
$("btnLibrary").addEventListener("click", backToLibrary);
// S3 transport
$("btnBack5").addEventListener("click", () => step(-5));
$("btnBack1").addEventListener("click", () => step(-1));
$("btnFwd1").addEventListener("click", () => step(1));
$("btnFwd5").addEventListener("click", () => step(5));
$("btnPlay").addEventListener("click", togglePlay);
// S3 模式列(default)+ 頂欄下載
$("btnLoop").addEventListener("click", toggleLoop);
$("btnTrim").addEventListener("click", toggleTrim);
$("btnDraw").addEventListener("click", toggleDraw);
$("btnDrawDone").addEventListener("click", toggleDraw);          // 畫筆層蓋住 btnDraw,層內必須有退出口
$("btnSpeed").addEventListener("click", cycleSpeed);
$("btnSave").addEventListener("click", saveClip);
// trim 完成/重置 + filmstrip 拖曳(把手 in/out + 條身 scrub)
$("btnTrimReset").addEventListener("click", resetTrim);
$("btnTrimDone").addEventListener("click", exitTrim);
$("fsTrack").addEventListener("pointerdown", fsDown);
$("fsTrack").addEventListener("pointermove", fsMove);
$("fsTrack").addEventListener("pointerup", fsUp);
$("fsTrack").addEventListener("pointercancel", fsUp);
["fsHandleL", "fsHandleR"].forEach((id, i) => {                  // capture 在把手上,move/up 也要掛把手
  const h = $(id);
  h.addEventListener("pointerdown", fsHandleDown(i === 0 ? "L" : "R"));
  h.addEventListener("pointermove", fsMove);
  h.addEventListener("pointerup", fsUp);
  h.addEventListener("pointercancel", fsUp);
});
// 標註工具列(模式列 draw 層;跳標註幀改走鍵盤 ↑↓)
document.querySelectorAll(".note-color").forEach(b => b.addEventListener("click", () => setPenColor(b.dataset.c, b)));
$("btnGhost").addEventListener("click", toggleGhost);
$("btnNoteUndo").addEventListener("click", undoNote);
$("btnNoteClear").addEventListener("click", clearNoteFrame);
// slider(拖動即 pause + seek 合流)
slider.addEventListener("pointerdown", () => { scrubbing = true; if (!video.paused) video.pause(); });
slider.addEventListener("input", () => seekToFrame(+slider.value));
slider.addEventListener("pointerup", () => { scrubbing = false; });
slider.addEventListener("change", () => { scrubbing = false; });
// stage gestures
stage.addEventListener("pointerdown", onPointerDown);
stage.addEventListener("pointermove", onPointerMove);
stage.addEventListener("pointerup", onPointerUp);
stage.addEventListener("pointercancel", onPointerUp);
stage.addEventListener("wheel", onWheel, { passive: false });
// 視窗尺寸 / 橫豎切換 → 重算 canvas 內容框(+ trim 模式 filmstrip 位置)
window.addEventListener("resize", () => { layoutNoteCanvas(); if (trimMode) updateFilmstrip(); });
// 片庫刪除兩段式:點別處復原(x 自身 click 有 stopPropagation,不會誤觸)
document.addEventListener("click", () => { if (pendingDel) clearPendingDel(); });

/* ======================= INIT ======================= */
async function init(){
  applyLang();
  initNoteCanvas();
  updateFpsChip(); setPlayUI(false);
  try{ const db = await idbOpen(); db.close && db.close(); idbAvailable = true; }
  catch(_){ idbAvailable = false; }                            // 私密瀏覽等 → 退回 session-only
  if (idbAvailable){
    try{ clips = await idbGetAll(); }catch(_){ clips = []; }
    clips.sort((a, b) => (b.created || 0) - (a.created || 0));  // 固定 created 新→舊
  }
  setIdbWarn(); renderLibrary(); showScreen("S1");
}
init();

// v5 PWA:service worker 註冊(靜默 try/catch,localhost 也照註冊;不 await、不擋主流程)
if ("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js").catch(()=>{});
</script>
